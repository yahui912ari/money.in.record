<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" vid="3">
    <title vid="4">Ume Matrix | Expedition Master v11.0</title>
    <script src="https://cdn.tailwindcss.com/3.4.17" vid="5"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;600;700&amp;family=Playfair+Display:ital,wght@1,500;1,600&amp;display=swap" rel="stylesheet" vid="6">
    
    <style vid="7">
        /* 全局 UI 修正 */
        body { -webkit-tap-highlight-color: transparent; background-color: #f8fbf8; font-family: 'Inter', sans-serif; color: #474a4d; overflow-x: hidden; width: 100%; }
        .font-matrix-title { font-family: 'Playfair Display', serif; font-weight: 600; font-style: italic; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 玻璃态组件 */
        .glass-panel { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.6); }
        .glass-card { background: linear-gradient(145deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.4) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.7); box-shadow: 0 8px 32px rgba(71, 74, 77, 0.05); }
        .glass-input { background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.8); transition: all 0.2s ease; color: #474a4d; width: 100%; }
        .glass-input:focus { outline: none; border-color: #a8c97f; background: rgba(255, 255, 255, 0.8); }
        
        /* 兼容性弹性布局 */
        .responsive-flex { display: flex; flex-wrap: wrap; gap: 8px; }
        .btn-active:active { transform: scale(0.96); }
        
        .ticker-container { mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-ticker { animation: ticker 60s linear infinite; }

        .modal-overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; position: fixed; inset: 0; z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; display: flex; }
        
        select.glass-input option { background-color: #ffffff; color: #474a4d; }
    </style>
</head>

<body class="w-full h-full flex flex-col relative" vid="8">

    <div class="flex flex-col h-full w-full relative z-10" vid="9">
        <header class="pt-10 pb-4 px-6 flex-shrink-0 z-20 relative" vid="10">
            <div class="flex justify-between items-start mb-6" vid="11">
                <div vid="12">
                    <h1 class="text-4xl font-matrix-title text-[#474a4d] leading-none mb-1" vid="13">Matrix</h1>
                    <p class="text-[10px] font-bold text-[#474a4d]/60 tracking-[0.2em] uppercase" vid="14">Expedition Master v11.0</p>
                </div>
                <button id="fx-display" class="px-3 py-1.5 rounded-full glass-panel text-[10px] font-mono font-semibold text-[#474a4d] btn-active" onclick="updateFX()" vid="15">Syncing FX...</button>
            </div>

            <div class="glass-card rounded-[32px] p-6 mb-4" vid="16">
                <div class="flex flex-col mb-5 cursor-pointer" onclick="openEditModal('baseBudget', 'Total Assets')" vid="17">
                    <span class="text-[10px] text-[#474a4d]/60 uppercase font-bold tracking-wider mb-1" vid="18">Total Assets (HKD)</span>
                    <div class="text-3xl font-mono font-bold text-[#474a4d] tracking-tight break-all" id="stat-assets" vid="19">0.00</div>
                </div>
                
                <div class="flex items-center justify-between border-t border-white/60 pt-4 text-center gap-1" vid="20">
                    <div class="flex-1 cursor-pointer" onclick="openEditModal('targetSaving', 'Target Saving')" vid="21">
                        <div class="text-[9px] text-[#474a4d]/60 uppercase font-bold tracking-wider mb-1" vid="22">Target</div>
                        <div class="text-base font-mono font-bold text-[#a8c97f]" id="stat-save" vid="23">0</div>
                    </div>
                    <div class="w-px h-6 bg-[#474a4d]/10" vid="24"></div>
                    <div class="flex-1" vid="25">
                        <div class="text-[9px] text-[#474a4d]/60 uppercase font-bold tracking-wider mb-1" vid="26">Daily Rec</div>
                        <div class="text-base font-mono font-bold text-[#e6cde3]" id="stat-daily" vid="27">0</div>
                    </div>
                    <div class="w-px h-6 bg-[#474a4d]/10" vid="28"></div>
                    <div class="flex-1" vid="29">
                        <div class="text-[9px] text-[#474a4d]/60 uppercase font-bold tracking-wider mb-1" vid="30">Cycle Left</div>
                        <div class="text-base font-mono font-bold text-[#474a4d]" id="stat-days" vid="31">0D</div>
                    </div>
                </div>
            </div>

            <div class="w-full h-10 rounded-full shadow-lg bg-white/80 backdrop-blur-xl border border-white flex items-center z-20 overflow-hidden relative" vid="32">
                <div class="absolute left-1 z-10 bg-white shadow-sm px-3 py-1 rounded-full text-[8px] font-bold tracking-widest text-[#474a4d] flex items-center gap-1.5" vid="33">
                    <div class="w-1 h-1 rounded-full bg-[#a8c97f] animate-pulse" vid="34"></div>TICKER
                </div>
                <div class="ticker-container w-full h-full flex items-center ml-20" vid="35">
                    <div id="main-ticker" class="flex whitespace-nowrap animate-ticker text-[10px] font-mono font-bold text-[#474a4d]/80 uppercase" vid="36"></div>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto px-6 pt-2 pb-56 space-y-8 no-scrollbar z-10" vid="37">
            <section vid="38">
                <div class="flex justify-between items-center mb-4" vid="39">
                    <h2 class="text-xs font-bold text-[#474a4d] tracking-widest uppercase" vid="40">Audit Stream</h2>
                    <div id="audit-summary" class="px-3 py-1 bg-white/60 backdrop-blur-sm rounded-full font-mono font-bold text-[9px] text-[#474a4d] border border-white" vid="41">NET: 0</div>
                </div>
                <div class="flex gap-2 overflow-x-auto no-scrollbar mb-4 pb-1" id="audit-filters" vid="42"></div>
                <div class="glass-card rounded-[24px] overflow-hidden" id="log-list" vid="43"></div>
            </section>

            <section vid="48">
                <div class="flex justify-between items-center mb-4" vid="49">
                    <h2 class="text-xs font-bold text-[#474a4d] tracking-widest uppercase" vid="50">Expedition Checklist</h2>
                    <button onclick="toggleModal('checklist-modal', true)" class="text-[10px] bg-white/60 text-[#474a4d] border border-white px-3 py-1.5 rounded-full font-bold btn-active shadow-sm" vid="51">Generator</button>
                </div>
                <div id="checklist-container" class="space-y-2" vid="52"></div>
            </section>

            <section vid="53">
                <h2 class="text-xs font-bold text-[#474a4d] tracking-widest uppercase mb-4" vid="55">Due Planning</h2>
                <div class="glass-card rounded-[24px] p-5 mb-4 space-y-3" vid="56">
                    <div class="responsive-flex" vid="57">
                        <select id="due-type" class="glass-input h-11 rounded-xl px-3 text-xs font-bold uppercase flex-[1_1_80px]" vid="58">
                            <option vid="59">Ticket</option><option vid="60">Event</option><option vid="61">Goods</option>
                        </select>
                        <input type="text" id="due-name" placeholder="Item Name" class="glass-input flex-[2_1_150px] rounded-xl px-4 text-sm h-11" vid="62">
                    </div>
                    <div class="responsive-flex" vid="63">
                        <input type="text" id="due-memo" placeholder="Memo" class="glass-input flex-1 rounded-xl px-4 text-sm h-11" vid="64">
                        <input type="text" id="due-date" placeholder="MM.DD" class="glass-input w-24 rounded-xl text-center text-sm font-mono h-11" vid="65">
                    </div>
                    <div class="responsive-flex" vid="66">
                        <input type="number" id="due-amt" placeholder="HKD Amount" class="glass-input flex-1 rounded-xl px-4 h-11 text-sm font-mono" vid="67">
                        <button onclick="addDue()" class="bg-[#474a4d] text-[#e6cde3] rounded-xl px-6 h-11 text-[10px] font-bold uppercase btn-active shadow-md" vid="68">Plan</button>
                    </div>
                </div>
                <div id="due-list" class="space-y-2" vid="69"></div>
            </section>

            <section vid="70">
                <h2 class="text-xs font-bold text-[#474a4d] tracking-widest uppercase mb-4" vid="71">Wishlist</h2>
                <div id="wish-container" class="space-y-3" vid="72"></div>
                <button onclick="toggleModal('wish-modal', true)" class="w-full mt-3 py-3 rounded-2xl border border-dashed border-[#474a4d]/30 text-[10px] font-bold text-[#474a4d]/60 uppercase btn-active" vid="73">New Wish</button>
            </section>
        </main>

        <div class="fixed bottom-0 left-0 right-0 p-4 z-40 pb-10 pointer-events-none" vid="74">
            <div class="rounded-[30px] p-4 shadow-2xl pointer-events-auto bg-white/90 backdrop-blur-xl border border-white max-w-md mx-auto" vid="75">
                <div class="flex flex-wrap justify-between items-center gap-3 mb-3 px-1" vid="76">
                    <label class="inline-flex items-center cursor-pointer" vid="78">
                        <input type="checkbox" id="via-octo" class="sr-only peer" vid="79">
                        <div class="w-8 h-4 bg-[#e6cde3] rounded-full peer-checked:bg-[#a8c97f] transition-colors border border-white" vid="80"></div>
                        <span class="ml-2 text-[9px] font-bold text-[#474a4d] uppercase" vid="81">Octopus</span>
                    </label>
                    <div class="flex gap-2" vid="82">
                        <select id="in-cur" class="bg-white/60 border border-white rounded-lg px-2 py-1.5 text-[10px] font-bold text-[#474a4d]" vid="83"><option vid="84">HKD</option><option vid="85">JPY</option><option vid="86">CNY</option></select>
                        <select id="in-cat" class="bg-white/60 border border-white rounded-lg px-2 py-1.5 text-[10px] font-bold text-[#474a4d]" vid="87">
                            <option value="Meal">Meal</option><option value="Transport">Transport</option><option value="Shopping">Shopping</option>
                            <option value="Takarazuka">Takarazuka</option><option value="TopUp">TopUp</option><option value="Income">Income</option>
                        </select>
                    </div>
                </div>
                <div class="responsive-flex" vid="95">
                    <input type="text" id="in-name" placeholder="Detail" class="glass-input flex-[2_1_120px] rounded-xl px-4 text-sm h-12" vid="96">
                    <input type="number" id="in-val" placeholder="0.00" class="glass-input flex-[1_1_70px] rounded-xl px-3 text-sm font-mono h-12 text-right" vid="97">
                    <button onclick="commitTransaction()" class="bg-[#e6cde3] text-[#474a4d] rounded-xl px-4 h-12 text-[10px] font-bold uppercase btn-active shadow-sm border border-white" vid="98">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <div id="checklist-modal" class="modal-overlay" vid="99">
        <div class="absolute inset-0 bg-[#474a4d]/20 backdrop-blur-sm" onclick="toggleModal('checklist-modal', false)"></div>
        <div class="glass-card rounded-[32px] p-8 w-full max-w-sm relative z-10 shadow-2xl">
            <h3 class="text-sm font-bold text-[#474a4d] uppercase mb-6 text-center">Expedition Generator</h3>
            <input type="text" id="tour-name" placeholder="Expedition Name" class="glass-input rounded-2xl px-4 py-3.5 text-sm mb-4">
            <div class="flex gap-4 mb-4 items-center justify-between px-2">
                <span class="text-xs font-bold text-[#474a4d] uppercase">Count</span>
                <input type="number" id="tour-count" value="1" class="glass-input w-20 rounded-xl py-2 text-center font-mono">
            </div>
            <button onclick="generateTour()" class="w-full py-4 rounded-2xl text-xs font-bold text-white bg-[#a8c97f] btn-active">Generate</button>
        </div>
    </div>

    <div id="edit-modal" class="modal-overlay" vid="111">
        <div class="absolute inset-0 bg-[#474a4d]/20 backdrop-blur-sm" onclick="toggleModal('edit-modal', false)"></div>
        <div class="glass-card rounded-[32px] p-8 w-full max-w-sm relative z-10 text-center shadow-2xl">
            <h3 id="modal-title" class="text-xs font-bold uppercase mb-6 text-[#474a4d]">Update</h3>
            <input type="number" id="modal-input" class="glass-input rounded-2xl py-4 text-2xl font-mono font-bold text-center mb-6">
            <div class="flex gap-3">
                <button onclick="toggleModal('edit-modal', false)" class="flex-1 py-3 rounded-2xl text-xs font-bold text-[#474a4d] bg-white/60 border border-white btn-active">Cancel</button>
                <button onclick="saveEditModal()" class="flex-1 py-3 rounded-2xl text-xs font-bold text-white bg-[#a8c97f] btn-active">Save</button>
            </div>
        </div>
    </div>

    <div id="wish-modal" class="modal-overlay" vid="119">
        <div class="absolute inset-0 bg-[#474a4d]/20 backdrop-blur-sm" onclick="toggleModal('wish-modal', false)"></div>
        <div class="glass-card rounded-[32px] p-8 w-full max-w-sm relative z-10 shadow-2xl">
            <h3 class="text-sm font-bold text-[#474a4d] uppercase mb-6 text-center">New Wish</h3>
            <input type="text" id="wish-name" placeholder="Item Name" class="glass-input rounded-2xl px-4 py-3.5 text-sm mb-4">
            <input type="number" id="wish-target" placeholder="Price (HKD)" class="glass-input rounded-2xl px-4 py-3.5 text-sm font-mono mb-6">
            <button onclick="addWish()" class="w-full py-4 rounded-2xl text-xs font-bold text-white bg-[#a8c97f] btn-active">Add Wish</button>
        </div>
    </div>

    <script vid="126">
        // 保持原有 JS 逻辑不变
        const STORAGE_KEY = 'ume_matrix_v11_expedition_pink';
        let FX = { HKD: 1.0, JPY: 0.052, CNY: 1.10 };
        let currentFilter = 'All', activeEditKey = null;

        let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { 
            records: [], dueDates: [], checklist: [], wishlist: [], baseBudget: 25000, targetSaving: 5000, octopusBal: 1000 
        };

        function toggleModal(id, show) {
            const el = document.getElementById(id);
            if (show) el.classList.add('active');
            else el.classList.remove('active');
        }

        async function updateFX() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/HKD');
                const data = await res.json();
                if(data.rates) {
                    FX.JPY = 1 / data.rates.JPY; FX.CNY = 1 / data.rates.CNY;
                    document.getElementById('fx-display').innerText = `JPY ${FX.JPY.toFixed(4)} • CNY ${FX.CNY.toFixed(2)}`;
                    refresh();
                }
            } catch(e) { document.getElementById('fx-display').innerText = "Offline FX"; }
        }

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); refresh(); }

        function getCycleDays() {
            const now = new Date();
            const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            const diff = lastDay - now;
            return Math.max(1, Math.ceil(diff / (1000 * 60 * 60 * 24)));
        }

        function calculateStats() {
            let pool = db.baseBudget, octo = db.octopusBal, todaySpent = 0;
            const todayStr = `${new Date().getMonth()+1}.${new Date().getDate()}`;
            db.records.forEach(r => {
                if(r.category === 'Exclude') return;
                if(r.category === 'Income') pool += r.valHKD;
                else if(r.category === 'TopUp') { pool -= r.valHKD; octo += r.valHKD; }
                else {
                    if(r.viaOcto) octo -= r.valHKD; else pool -= r.valHKD;
                    if(r.fullDate === todayStr && ['Meal','Transport','Shopping'].includes(r.category)) todaySpent += r.valHKD;
                }
            });
            const daysLeft = getCycleDays();
            const rec = Math.max(0, (pool - db.targetSaving) * 0.8 / daysLeft);
            return { pool, octo, rec, daysLeft, todaySpent };
        }

        function commitTransaction() {
            const v = parseFloat(document.getElementById('in-val').value);
            const cur = document.getElementById('in-cur').value;
            const cat = document.getElementById('in-cat').value;
            const name = document.getElementById('in-name').value || cat;
            if(isNaN(v) || v <= 0) return;

            const stats = calculateStats();
            const valHKD = v * FX[cur];

            if(['Meal','Transport','Shopping'].includes(cat) && db.wishlist.length > 0) {
                const saving = (stats.rec - stats.todaySpent) - valHKD;
                if(saving > 0) db.wishlist[0].saved += saving;
            }

            db.records.unshift({ 
                name, valHKD, category: cat, 
                viaOcto: document.getElementById('via-octo').checked, 
                fullDate: `${new Date().getMonth()+1}.${new Date().getDate()}` 
            });
            document.getElementById('in-val').value = ''; document.getElementById('in-name').value = '';
            save();
        }

        function generateTour() {
            const name = document.getElementById('tour-name').value;
            const count = parseInt(document.getElementById('tour-count').value);
            if(!name) return;
            db.checklist.push({ name: `${name} | Ticket`, done: false, group: name, type: 'Ticket' });
            for(let i=1; i<=count; i++) {
                db.checklist.push({ name: `${name} | Hotel ${i}`, done: false, group: name });
                db.checklist.push({ name: `${name} | Flight ${i}`, done: false, group: name });
            }
            toggleModal('checklist-modal', false); save();
        }

        function addDue() {
            const n = document.getElementById('due-name').value, a = document.getElementById('due-amt').value, d = document.getElementById('due-date').value, t = document.getElementById('due-type').value, m = document.getElementById('due-memo').value;
            if(!n || !a) return;
            db.dueDates.push({ id: Date.now(), type: t, name: n, amount: parseFloat(a), date: d || '99.99', memo: m });
            document.getElementById('due-name').value = ''; document.getElementById('due-amt').value = ''; save();
        }

        function executeDue(id) {
            const idx = db.dueDates.findIndex(d => d.id === id);
            const item = db.dueDates[idx];
            if(confirm(`Pay ${item.name}?`)) {
                db.records.unshift({ name: `[${item.type}] ${item.name}`, valHKD: item.amount, category: 'Takarazuka', viaOcto: false, fullDate: `${new Date().getMonth()+1}.${new Date().getDate()}` });
                db.dueDates.splice(idx, 1); save();
            }
        }

        function addWish() {
            const n = document.getElementById('wish-name').value, t = parseFloat(document.getElementById('wish-target').value);
            if(n && t) { db.wishlist.push({ name: n, target: t, saved: 0 }); toggleModal('wish-modal', false); save(); }
        }

        function refresh() {
            const s = calculateStats();
            document.getElementById('stat-assets').innerText = s.pool.toLocaleString(undefined, {minimumFractionDigits:2});
            document.getElementById('stat-save').innerText = db.targetSaving.toLocaleString();
            document.getElementById('stat-daily').innerText = s.rec.toFixed(0);
            document.getElementById('stat-days').innerText = `${s.daysLeft}D`;

            let tickerParts = [];
            db.checklist.filter(c => !c.done).forEach(c => tickerParts.push(`TASK: ${c.name}`));
            db.dueDates.forEach(d => tickerParts.push(`DUE: ${d.name} (${d.amount})`));
            document.getElementById('main-ticker').innerHTML = (tickerParts.length ? tickerParts.map(p => `<span class="mx-10">${p}</span>`).join('') : `<span class="mx-10 opacity-40">ALL CLEAR</span>`).repeat(5);

            const cats = ['All', 'Meal', 'Transport', 'Shopping', 'Takarazuka', 'TopUp', 'Income'];
            document.getElementById('audit-filters').innerHTML = cats.map(c => `<button onclick="setFilter('${c}')" class="px-4 py-1.5 rounded-full border border-white text-[9px] font-bold uppercase transition-all ${currentFilter === c ? 'bg-[#474a4d] text-white' : 'bg-white/40 text-[#474a4d]'}">${c}</button>`).join('');
            
            const filtered = db.records.filter(r => currentFilter === 'All' || r.category === currentFilter);
            document.getElementById('log-list').innerHTML = filtered.slice(0, 15).map(r => `<div class="flex justify-between items-center p-4 border-b border-white/40 last:border-0"><div class="text-xs font-bold text-[#474a4d]">${r.name}<div class="text-[9px] text-[#474a4d]/50 uppercase">${r.fullDate}</div></div><div class="font-mono font-bold text-sm">${r.valHKD.toFixed(1)}</div></div>`).join('');
            
            document.getElementById('checklist-container').innerHTML = db.checklist.map((c, i) => `
                <div class="glass-card rounded-2xl p-3 flex justify-between items-center ${c.done?'opacity-40':''}">
                    <span class="text-xs font-semibold ${c.done?'line-through':''}">${c.name}</span>
                    <input type="checkbox" ${c.done?'checked':''} onchange="toggleCheck(${i})" class="w-4 h-4 accent-[#a8c97f]">
                </div>`).join('');

            document.getElementById('due-list').innerHTML = db.dueDates.map(d => `
                <div class="glass-card rounded-2xl p-4 flex justify-between items-center">
                    <div class="text-xs font-bold text-[#474a4d]">${d.name}<div class="text-[9px] opacity-50">${d.date}</div></div>
                    <button onclick="executeDue(${d.id})" class="bg-[#474a4d] text-[#e6cde3] text-[9px] font-bold px-3 py-2 rounded-lg uppercase btn-active">Pay</button>
                </div>`).join('');

            document.getElementById('wish-container').innerHTML = db.wishlist.map((w, i) => {
                const perc = Math.min(100, (w.saved/w.target)*100);
                return `<div class="glass-card rounded-2xl p-4">
                    <div class="flex justify-between mb-2 text-[10px] font-bold uppercase"><span>${w.name}</span><span>${perc.toFixed(1)}%</span></div>
                    <div class="w-full h-1.5 bg-white/60 rounded-full overflow-hidden"><div class="h-full bg-[#a8c97f]" style="width:${perc}%"></div></div>
                </div>`;
            }).join('');
        }

        window.toggleCheck = (i) => { db.checklist[i].done = !db.checklist[i].done; save(); };
        function setFilter(f) { currentFilter = f; refresh(); }
        function openEditModal(k, t) { activeEditKey = k; document.getElementById('modal-title').innerText = t; document.getElementById('modal-input').value = db[k]; toggleModal('edit-modal', true); }
        function saveEditModal() { db[activeEditKey] = parseFloat(document.getElementById('modal-input').value) || 0; toggleModal('edit-modal', false); save(); }

        updateFX();
    </script>
</body></html>
